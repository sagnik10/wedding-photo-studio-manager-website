{% extends "base.html" %}
{% block content %}

<style>
.form-wrapper{
  max-width:500px;
  margin:80px auto;
  padding:30px;
  background:#f5f5f5;
}
input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ddd;
}
.btn{
  width:100%;
  padding:14px;
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
  letter-spacing:2px;
}
.btn:hover{
  background:#000;
}
</style>

<div class="form-wrapper">

<h2 style="text-align:center;margin-bottom:20px;">Book a Session</h2>

<form method="POST">
{% csrf_token %}

<input name="name" placeholder="Name" required>
<input name="email" type="email" placeholder="Email" required>
<input type="date" name="event_date" required>
<textarea name="message" placeholder="Details"></textarea>

<button class="btn">SUBMIT BOOKING</button>

</form>

</div>

{% endblock %}
