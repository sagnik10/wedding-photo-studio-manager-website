{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-[#f5f5f5]">
  <div class="w-full max-w-xl text-center">

    <h1 class="text-4xl font-light text-gray-700 mb-4">Account sign in</h1>
    <div class="w-10 h-[2px] bg-gray-300 mx-auto mb-8"></div>

    <p class="text-gray-600 mb-8 text-sm">
      Sign in to your account to access your profile, history, and any private pages you've been granted access to.
    </p>

    <form method="POST">
      {% csrf_token %}

      <input name="username"
             placeholder="Email"
             class="w-full p-4 border border-gray-300 mb-4 bg-white outline-none focus:ring-1 focus:ring-gray-400">

      <input type="password"
             name="password"
             placeholder="Password"
             class="w-full p-4 border border-gray-300 mb-6 bg-white outline-none focus:ring-1 focus:ring-gray-400">

      <button class="w-full bg-gray-300 text-black py-3 tracking-widest hover:bg-gray-400 transition">
        SIGN IN
      </button>
    </form>

    <p class="mt-4 text-sm">
      <a href="#" class="text-gray-600 underline">Reset password</a>
    </p>

    <p class="mt-6 text-gray-600 text-sm">
      Not a member?
      <a href="{% url 'accounts:signup' %}" class="underline">Create account.</a>
    </p>

  </div>
</div>

{% endblock %}
