{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-[#f5f5f5]">
  <div class="w-full max-w-xl text-center">

    <h1 class="text-4xl font-light text-gray-700 mb-4">Create Account</h1>
    <div class="w-10 h-[2px] bg-gray-300 mx-auto mb-8"></div>

    <form method="POST">
      {% csrf_token %}

      <input name="username"
             placeholder="Username"
             class="w-full p-4 border border-gray-300 mb-4 bg-white outline-none focus:ring-1 focus:ring-gray-400">

      <input name="email"
             placeholder="Email"
             class="w-full p-4 border border-gray-300 mb-4 bg-white outline-none focus:ring-1 focus:ring-gray-400">

      <input type="password"
             name="password"
             placeholder="Password"
             class="w-full p-4 border border-gray-300 mb-4 bg-white outline-none focus:ring-1 focus:ring-gray-400">

      <div class="flex items-center justify-center mb-6">
        <input type="checkbox" class="mr-2">
        <span class="text-sm text-gray-600">
          Sign me up to receive exclusive member benefits via email.
        </span>
      </div>

      <button class="w-full bg-gray-300 text-black py-3 tracking-widest hover:bg-gray-400 transition">
        CREATE ACCOUNT
      </button>
    </form>

    <p class="mt-6 text-gray-600 text-sm">
      Already have an account?
      <a href="{% url 'accounts:login' %}" class="underline">Sign in</a>
    </p>

    <p class="mt-6 text-xs text-gray-500">
      This site is protected by reCAPTCHA and the Google Privacy Policy and Terms of Service apply.
    </p>

  </div>
</div>

{% endblock %}
