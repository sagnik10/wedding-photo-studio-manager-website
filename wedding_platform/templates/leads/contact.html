{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto mt-20 bg-gray-100 p-8">

<h2 class="text-2xl mb-6 text-center">Contact</h2>

<form method="POST">
{% csrf_token %}

<input name="name" class="w-full p-3 border mb-3" placeholder="Name">
<input name="email" class="w-full p-3 border mb-3" placeholder="Email">
<textarea name="message" class="w-full p-3 border mb-3" placeholder="Message"></textarea>

<button class="w-full bg-black text-white py-3">
Send
</button>

</form>

</div>

{% endblock %}
